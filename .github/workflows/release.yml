name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    name: Build Snugle Musix APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK 21 ──────────────────────────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Gradle cache ────────────────────────────────────────────────
      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. local.properties (Android SDK path) ─────────────────────────
      - name: 📱 Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 5. gradlew executable ──────────────────────────────────────────
      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Write secrets.properties ────────────────────────────────────
      - name: 🔑 Write secrets.properties
        run: |
          echo "LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}" >> secrets.properties
          echo "LASTFM_SECRET=${{ secrets.LASTFM_SECRET }}"   >> secrets.properties
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> secrets.properties

      # ── 7. Decode release keystore ─────────────────────────────────────
      - name: 🗝️ Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/keystore/release.keystore

      # ── 8. Build signed release APKs ───────────────────────────────────
      - name: 🏗️ Build Release APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            assembleFossUniversalRelease \
            assembleFossArm64Release \
            --no-daemon \
            --stacktrace

      # ── 9. Collect APKs ────────────────────────────────────────────────
      - name: 📦 Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      # ── 10. Get version from tag ───────────────────────────────────────
      - name: 🏷️ Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      # ── 11. Create GitHub Release ──────────────────────────────────────
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Snugle Musix ${{ steps.version.outputs.tag }}"
          body: |
            ## 🎵 Snugle Musix ${{ steps.version.outputs.tag }}

            ### Download
            | APK | Description |
            |-----|-------------|
            | `*-fossUniversal-release.apk` | All devices (ARM, x86) — recommended for most |
            | `*-fossArm64-release.apk`     | ARM64 only — smaller, optimized for modern phones |

            ### Installation
            1. Download the APK below
            2. Go to **Settings → Install unknown apps** on your Android phone
            3. Open the APK and install

            **Requirements:** Android 8.0+ (API 26)

            ---
            *© aberrant · [Portfolio](https://aberrant-portfolio-2026.web.app/) · [GitHub](https://github.com/prasanna172605) · [Instagram](https://www.instagram.com/__prasannaaah__/)*
          draft: false
          prerelease: false
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Upload as workflow artifact (backup) ───────────────────────
      - name: 📎 Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: snugle-musix-${{ steps.version.outputs.tag }}
          path: artifacts/*.apk
          retention-days: 30
