name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'       # Triggers on version tags like v1.0.0, v5.1.92, etc.
  workflow_dispatch:    # Also allows manual triggering from GitHub UI
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write       # Needed to create GitHub Releases and upload APKs

jobs:
  build:
    name: Build Snugle Musix APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up JDK 21 ──────────────────────────────────────────────
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Set up Android SDK ─────────────────────────────────────────
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Grant execute permission to Gradle wrapper ─────────────────
      - name: 🔐 Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Write secrets.properties from GitHub Secrets ───────────────
      - name: 🔑 Write secrets.properties
        run: |
          echo "LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}" >> secrets.properties
          echo "LASTFM_SECRET=${{ secrets.LASTFM_SECRET }}"   >> secrets.properties
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> secrets.properties

      # ── 6. Decode and place release keystore ──────────────────────────
      - name: 🗝️ Decode release keystore
        if: github.event_name == 'push' || github.event.inputs.release_type == 'release'
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release.keystore

      # ── 7. Build release APKs (universal + arm64, foss flavor) ────────
      - name: 🏗️ Build Release APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew \
            assembleFossUniversalRelease \
            assembleFossArm64Release \
            --no-daemon \
            --stacktrace

      # ── 8. Collect APKs ───────────────────────────────────────────────
      - name: 📦 Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts/

      # ── 9. Extract version name from tag ──────────────────────────────
      - name: 🏷️ Get version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      # ── 10. Generate Release Notes ────────────────────────────────────
      - name: 📝 Generate Release Notes
        id: release_notes
        run: |
          cat << 'EOF' > release_notes.md
          ## 🎵 Snugle Musix ${{ steps.version.outputs.tag }}

          ### What's New
          - Latest build of **Snugle Musix** by *aberrant*
          - Built automatically from source

          ### Download
          | APK | Description |
          |-----|-------------|
          | `*-universal-release.apk` | Works on all Android devices (ARM64, x86, etc.) |
          | `*-arm64-release.apk`     | Optimized for modern ARM64 devices (recommended) |

          ### Installation
          1. Download the APK for your device
          2. On your Android phone, go to **Settings → Install unknown apps** and allow your browser/file manager
          3. Open the downloaded APK and install

          ### Requirements
          - Android 8.0 (API 26) or higher

          ---
          *© aberrant · [Portfolio](https://aberrant-portfolio-2026.web.app/) · [GitHub](https://github.com/prasanna172605)*
          EOF

      # ── 11. Create GitHub Release and upload APKs ─────────────────────
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:  ${{ steps.version.outputs.tag }}
          name:      "Snugle Musix ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          draft:     false
          prerelease: false
          files:     artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Upload APKs as workflow artifacts (for debugging) ─────────
      - name: 📎 Upload to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snugle-musix-${{ steps.version.outputs.tag }}
          path: artifacts/*.apk
          retention-days: 30
